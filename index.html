<!doctype html>
<html lang="fr">
<head>

  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>nifty.fluffy2 | Bio Link Premium</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Fond d'écran avec distorsion -->
  <div class="bg-container"></div>
  <div class="bg-vignette"></div>

  <main class="card" id="card">

    <div class="glass-grain"></div>

    <div class="content">
      <header class="header">
        <div class="avatar-wrapper">

          <div class="avatar-placeholder">
            <span>N</span>
          </div>
          <div class="online-indicator"></div>
        </div>
        <h1 class="name-display">nifty.fluffy2</h1>
      </header>

      <nav class="links-container">
        <!-- TikTok -->
        <a class="link-card" href="https://www.tiktok.com/@nifty.fluffy2" target="_blank" rel="noopener">
          <div class="link-icon">
            <img src="canva-tik-tok-icon-MAGzNubTHuw.png" alt="TikTok">
          </div>
          <div class="link-text">
            <span class="link-title">TikTok</span>
            <span class="link-sub">@nifty.fluffy2</span>
          </div>
          <div class="link-action">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M9 18l6-6-6-6"/></svg>
          </div>
        </a>

        <!-- YouTube (FIXED) -->
        <a class="link-card" href="https://www.youtube.com/@ミcYnEsSaMiLl彡" target="_blank" rel="noopener">
          <div class="link-icon">
            <img src="png-logo-youtube (1).png" alt="YouTube">
          </div>
          <div class="link-text">
            <span class="link-title">YouTube</span>
            <span class="link-sub">ミcYnEsSaMiLl彡</span>
          </div>
          <div class="link-action">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M9 18l6-6-6-6"/></svg>
          </div>
        </a>

        <!-- Instagram -->
        <a class="link-card" href="https://www.instagram.com/nifty.fluffy2" target="_blank" rel="noopener">
          <div class="link-icon">
            <img src="instagrame-logo.png" alt="Instagram">
          </div>
          <div class="link-text">
            <span class="link-title">Instagram</span>
            <span class="link-sub">nifty.fluffy2</span>
          </div>
          <div class="link-action">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M9 18l6-6-6-6"/></svg>
          </div>
        </a>
      </nav>
      
      <footer class="footer">
        <p>© 2026 nifty.fluffy2</p>
      </footer>
    </div>

    <!-- Curseur de lumière interactif -->
    <div class="shine" id="shine"></div>
  </main>

  <script src="script.js"></script>

</html>
