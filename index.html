<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="card" id="card" role="main" aria-label="profile card">
    <div class="content" style="align-items:center;justify-content:center;text-align:center;">
      <div style="display:flex;flex-direction:column;gap:14px;align-items:center;width:100%;max-width:520px;">


        <div style="display:flex;flex-direction:column;gap:6px;align-items:center;">
          <div style="font-weight:900;font-size:28px;letter-spacing:0.6px;" class="name">nifty.fluffy2</div>
        </div>

        <div class="profiles" style="width:100%;justify-content:center;gap:12px;flex-wrap:wrap;">
          <!-- clickable profile links (open in new tab) -->
          <a class="profile profile--tiktok" style="min-width:120px;max-width:220px;" href="https://www.tiktok.com/@nifty.fluffy2?_r=1&_t=ZN-962AunZfWic" target="_blank" rel="noopener noreferrer">
            <img class="profile-pfp" src="/canva-tik-tok-icon-MAGzNubTHuw.png" alt="TikTok logo" style="width:56px;height:56px;border-radius:12px;object-fit:cover;" />
            <div class="profile-info">
              <div class="handle">@nifty.fluffy2</div>
            </div>
          </a>

          <a class="profile profile--yt" style="min-width:120px;max-width:220px;" href="https://www.youtube.com/@ミcYnEsSaMiLl彡" target="_blank" rel="noopener noreferrer">
            <img class="profile-pfp" src="png-logo-youtube%20(1).png" alt="YouTube logo" style="width:56px;height:56px;border-radius:12px;object-fit:cover;" />
            <div class="profile-info">
              <div class="handle">@ミcYnEsSaMiLl彡</div>
            </div>
          </a>

          <a class="profile profile--ig" style="min-width:120px;max-width:220px;" href="https://www.instagram.com/nifty.fluffy2?igsh=MXVqaHRoMWEyaGg1ag==" target="_blank" rel="noopener noreferrer">
            <img class="profile-pfp" src="/instagrame-logo.png" alt="Instagram logo" style="width:56px;height:56px;border-radius:12px;object-fit:cover;" />
            <div class="profile-info">
              <div class="handle">nifty.fluffy2</div>
            </div>
          </a>
        </div>

      </div>
    </div>

    <div class="avatar-glow" aria-hidden="true"></div>

  </main>

  <script src="script.js"></script>
</body>
</html>
