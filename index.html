<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>nifty.fluffy2 | Premium Links</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Conteneur pour le fond d'écran fixe afin d'éviter les saccades -->
  <div class="bg-container"></div>

  <main class="card" id="card">
    <!-- Texture de grain pour le réalisme du verre -->
    <div class="glass-grain"></div>
    
    <div class="content">
      <div class="header">
        <h1 class="name">nifty.fluffy2</h1>
        <div class="status-badge">En ligne</div>
      </div>

      <div class="profiles-grid">
        <!-- TikTok -->
        <a class="profile-item" href="https://www.tiktok.com/@nifty.fluffy2" target="_blank">
          <div class="pfp-container">
            <img class="pfp" src="canva-tik-tok-icon-MAGzNubTHuw.png" alt="TikTok">
          </div>
          <div class="info">
            <span class="platform">TikTok</span>
            <span class="handle">@nifty.fluffy2</span>
          </div>
          <div class="arrow">→</div>
        </a>

        <!-- YouTube -->
        <a class="profile-item" href="https://www.youtube.com/@ミcYnEsSaMiLl彡" target="_blank">
          <div class="pfp-container">
            <img class="pfp" src="png-logo-youtube (1).png" alt="YouTube">
          </div>
          <div class="info">
            <span class="platform">YouTube</span>
            <span class="handle">ミcYnEsSaMiLl彡</span>
          </div>
          <div class="arrow">→</div>
        </a>

        <!-- Instagram -->
        <a class="profile-item" href="https://www.instagram.com/nifty.fluffy2" target="_blank">
          <div class="pfp-container">
            <img class="pfp" src="instagrame-logo.png" alt="Instagram">
          </div>
          <div class="info">
            <span class="platform">Instagram</span>
            <span class="handle">nifty.fluffy2</span>
          </div>
          <div class="arrow">→</div>
        </a>
      </div>
    </div>

    <!-- Reflet brillant qui suit le mouvement (via JS) -->
    <div class="shine-effect" id="shine"></div>
  </main>

  <script src="script.js"></script>
</body>
</html>
